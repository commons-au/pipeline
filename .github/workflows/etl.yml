name: Update Data

on:
  schedule:
    # Runs every Sunday at midnight UTC
    - cron: '0 0 * * 0'
  # Allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  etl:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout pipeline
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch data from government APIs
        run: python fetch.py

      - name: Transform and merge data
        run: python merge.py

      - name: Clone data repo
        run: |
          git clone https://x-access-token:${{ secrets.DATA_REPO_TOKEN }}@github.com/commons-au/data.git data-repo

      - name: Copy output to data repo
        run: |
          cp output/services.csv data-repo/data/services.csv
          cp output/services.json data-repo/data/services.json
          cp output/SOURCES.md data-repo/SOURCES.md

      - name: Commit and push to data repo
        run: |
          cd data-repo
          git config user.name "commons-au-bot"
          git config user.email "bot@commons-au.org"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update data from government sources ($(date -u +%Y-%m-%d))"
            git push
          fi

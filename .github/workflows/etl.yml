name: Run ETL Pipeline

on:
  workflow_dispatch:

jobs:
  fetch:
    name: Fetch Government Data
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - run: python fetch.py
      - uses: actions/upload-artifact@v4
        with:
          name: sources
          path: sources/
          retention-days: 1

  build:
    name: Transform and Merge
    runs-on: ubuntu-latest
    needs: [fetch]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt

      - uses: actions/download-artifact@v4
        with:
          name: sources
          path: sources/

      - run: python merge.py

      - uses: actions/upload-artifact@v4
        with:
          name: output
          path: output/
          retention-days: 1

  publish:
    name: Publish to Data Repo
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: output
          path: output/

      - name: Clone data repo
        run: |
          git clone https://x-access-token:${{ secrets.DATA_REPO_TOKEN }}@github.com/commons-au/data.git data-repo

      - name: Copy output to data repo
        run: |
          find data-repo/gov -name '*.csv' -o -name 'SOURCES.md' | xargs rm -f
          cp -r output/gov/. data-repo/gov/

      - name: Commit and push to data repo
        run: |
          cd data-repo
          git config user.name "commons-au-bot"
          git config user.email "bot@commons-au.org"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update government data ($(date -u +%Y-%m-%d))"
            git push
          fi
